<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobino Demo</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:#09090B;
    color:white;

    font-family:tahoma;
}

.card{
    width:600px;
    max-width:90%;

    background:#111827;

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 0 80px rgba(59,130,246,.15);
}

.logo{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    opacity:.8;
    margin-bottom:30px;
}

.desc{
    line-height:2;
    opacity:.7;
}

.btn{
    display:inline-block;

    margin-top:30px;

    padding:14px 28px;

    border-radius:14px;

    text-decoration:none;

    background:#3B82F6;

    color:white;

    font-weight:bold;

    transition:.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

.github{
    margin-top:25px;
    opacity:.6;
    font-size:14px;
}

.github a{
    color:#06B6D4;
}

</style>

</head>
<body>

<div class="card">

<div class="logo">
موبینو
</div>

<div class="subtitle">
سامانه تحلیل و مقایسه هوشمند گوشی‌های موبایل
</div>

<div class="desc">
نسخه نمایشی پروژه دانشگاهی

برای ورود به آخرین نسخه آنلاین پروژه روی دکمه زیر کلیک کنید.
</div>

<a class="btn"
href="https://lurk-donor-surging.ngrok-free.dev"
target="_blank">

ورود به نسخه آنلاین

</a>

<div class="github">

مخزن گیت‌هاب پروژه

<br><br>

<a href="https://github.com/ahmadiana/mobino">

مشاهده سورس پروژه

</a>

</div>

</div>

</body>
</html>
